<!DOCTYPE html>
{% load static %}
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}Главная{% endblock %}</title>
        {% block extra_css %}
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"/>
        <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick-theme.css"/>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.css"/>
        <link rel="stylesheet" href="{% static 'css/base.css' %}"/>
        {% endblock %}
    </head>
    <body>
        <header class="navbar navbar-expand-lg bg-dark-custom py-3">
            <div class="container">
                <div class="d-flex align-items-center gap-3">
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <a href="/" class="navbar-brand m-0">
                        <img src="{% static 'svg/nasa.svg' %}" alt="NASA" width="77">
                    </a>
                </div>
                <div class="d-block order-lg-3">
                    <a href="/admin/" class="btn-custom-login text-decoration-none">Вход</a>
                </div>
                <div class="collapse navbar-collapse justify-content-center order-lg-2" id="navbarNav">
                    <ul class="navbar-nav gap-lg-4">
                        <li class="nav-item">
                            <a href="#advantages" class="nav-link text-white fw-semibold text-uppercase">Преимущества</a>
                        </li>
                        <li class="nav-item">
                            <a href="#photos" class="nav-link text-white fw-semibold text-uppercase">Фотографии</a>
                        </li>
                    </ul>
                </div>
            </div>
        </header>
        <main>
            {% block content %}{% endblock %}
        </main>
        {% block extra_js %}
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.umd.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
        <script src={% static 'js/slider-syncing.js' %}></script>
        <script>
            $(document).ready(function() {
                $('.navbar-nav .nav-link').on('click', function() {
                    if ($('.navbar-collapse').hasClass('show')) {
                        $('.navbar-toggler').click();
                    }
                });
            });
        </script>
        {% endblock %}
    </body>
</html>
